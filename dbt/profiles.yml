spotify_gold:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "{{ env_var('DBT_DUCKDB_PATH', 'data/spotify.duckdb') }}"
      threads: 4
    prod:
      type: duckdb
      path: "{{ env_var('DBT_DUCKDB_PATH', '/opt/airflow/data/spotify.duckdb') }}"
      threads: 4
    # Future target — populated from the Airflow Connection `dbt_postgres`
    # via env vars exported by the BashOperator in dags/spotify_etl_dag.py
    # (see docs/setup.md section 13 for the switch procedure).
    pg:
      type: postgres
      host: "{{ env_var('DBT_PG_HOST') }}"
      port: "{{ env_var('DBT_PG_PORT', '5432') | int }}"
      user: "{{ env_var('DBT_PG_USER') }}"
      password: "{{ env_var('DBT_PG_PASSWORD') }}"
      dbname: "{{ env_var('DBT_PG_DBNAME') }}"
      schema: "{{ env_var('DBT_PG_SCHEMA', 'gold') }}"
      threads: 4
