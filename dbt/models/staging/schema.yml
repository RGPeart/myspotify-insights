version: 2

models:
  - name: stg_silver_tracks
    description: "Thin view over silver/tracks.parquet — renames popularity → track_popularity."
    columns:
      - name: track_id
        description: "Spotify track ID."
        tests:
          - unique
          - not_null
      - name: name
        tests:
          - not_null
      - name: primary_artist_id
        description: "FK candidate to dim_artists.artist_id."

  - name: stg_silver_artists
    description: "Thin view over silver/artists.parquet — renames popularity → artist_popularity, name → artist_name."
    columns:
      - name: artist_id
        tests:
          - unique
          - not_null
      - name: artist_name
        tests:
          - not_null
      - name: primary_genre
        tests:
          - not_null

  - name: stg_silver_audio_features
    description: "Thin view over silver/audio_features.parquet — all features already normalized in the bronze→silver step."
    columns:
      - name: track_id
        tests:
          - unique
          - not_null
      - name: danceability
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
      - name: energy
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
      - name: tempo
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
